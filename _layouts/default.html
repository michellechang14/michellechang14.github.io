<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}#biography">Biography</a>
        <a href="{{ '/' | relative_url }}#news">News</a>
        <a href="{{ '/' | relative_url }}#research">Research</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/' | relative_url }}#education">Education</a>
        <a href="{{ '/' | relative_url }}#honors">Honors</a>
        <a href="{{ '/scholar/' | relative_url }}">Scholar</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© {{ site.time | date: '%Y' }} {{ site.data.profile.name }}</p>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
